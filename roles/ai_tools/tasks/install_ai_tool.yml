---
- block:
    - name: Install/Update {{ ai_tool_name }} if needed
      shell: |
        {{ ai_tool_install_command }}
      args:
        executable: /bin/zsh
      changed_when: lookup('vars', ai_tool_needs_update_var) | default(false) | bool
      when: lookup('vars', ai_tool_needs_update_var) | default(false) | bool
      register: ai_tool_install_result

    - name: Verify {{ ai_tool_name }} binary exists
      stat:
        path: "{{ ai_tool_binary_path }}"
      register: ai_tool_binary_stat

    - name: Fail if {{ ai_tool_name }} binary not found
      fail:
        msg: "{{ ai_tool_name }} installation failed - binary not found at {{ ai_tool_binary_path }}"
      when: not ai_tool_binary_stat.stat.exists

  rescue:
    - name: Handle {{ ai_tool_name }} installation failure
      debug:
        msg: "{{ ai_tool_name }} installation failed: {{ ai_tool_install_result.stderr | default('Unknown error') }}"

    - name: Check if {{ ai_tool_name }} was partially installed
      stat:
        path: "{{ ai_tool_binary_path }}"
      register: ai_tool_partial_stat

    - name: Clean up failed {{ ai_tool_name }} installation
      file:
        path: "{{ ai_tool_binary_path }}"
        state: absent
      when: ai_tool_partial_stat.stat.exists | default(false)

    - name: Re-raise {{ ai_tool_name }} installation failure
      fail:
        msg: "{{ ai_tool_name }} installation failed and cleanup completed"
