---
- name: Verify volta is available for all AI tools
  command: volta --version
  register: volta_version
  changed_when: false
  failed_when: volta_version.rc != 0

- name: Display volta version
  debug:
    msg: "Using volta {{ volta_version.stdout }}"

- name: Initialize AI tools installation facts
  set_fact:
    ai_tools_summary:
      claude_code:
        installed: false
        version: "not installed"
        mcp_installed: false
      codex:
        installed: false
        version: "not installed"
        context7_installed: false
    ai_tools_errors: []

- block:
    - name: Install Claude Code (Latest Version)
      shell: |
        volta install @anthropic-ai/claude-code@latest
      args:
        executable: /bin/zsh
        creates: "{{ volta_root }}/bin/claude"
      register: claude_install_result

    - name: Install OpenAI Codex CLI (Latest Version)
      shell: |
        volta install @openai/codex@latest
      args:
        executable: /bin/zsh
        creates: "{{ volta_root }}/bin/codex"
      register: codex_install_result

  rescue:
    - name: Handle AI tools installation failures
      set_fact:
        ai_tools_errors: "{{ ai_tools_errors + ['AI tools installation failed'] }}"

# Detect Claude Code installation and version
- name: Check Claude Code binary
  stat:
    path: "{{ volta_root }}/bin/{{ ai_tools_config.claude_code.binary }}"
  register: claude_bin

- name: Get Claude Code version
  command: "{{ ai_tools_config.claude_code.binary }} --version"
  register: claude_version_check
  changed_when: false
  failed_when: false
  when: claude_bin.stat.exists

- name: Update summary for Claude Code
  set_fact:
    ai_tools_summary: "{{ ai_tools_summary | combine({'claude_code': {'installed': claude_bin.stat.exists, 'version': (claude_version_check.stdout if claude_bin.stat.exists else 'not installed'), 'mcp_installed': false}}, recursive=True) }}"

# Detect Codex CLI installation and version
- name: Check Codex CLI binary
  stat:
    path: "{{ volta_root }}/bin/{{ ai_tools_config.codex.binary }}"
  register: codex_bin

- name: Get Codex CLI version
  command: "{{ ai_tools_config.codex.binary }} --version"
  register: codex_version_check
  changed_when: false
  failed_when: false
  when: codex_bin.stat.exists

- name: Update summary for Codex CLI
  set_fact:
    ai_tools_summary: "{{ ai_tools_summary | combine({'codex': {'installed': codex_bin.stat.exists, 'version': (codex_version_check.stdout if codex_bin.stat.exists else 'not installed'), 'context7_installed': false}}, recursive=True) }}"

- name: Display installation summary
  debug:
    msg:
      - "=== Installed AI Tools ==="
      - "{% if ai_tools_summary.claude_code.installed %}✓ Claude Code: {{ ai_tools_summary.claude_code.version }}{% else %}✗ Claude Code: not installed{% endif %}"
      - "{% if ai_tools_summary.codex.installed %}✓ Codex CLI: {{ ai_tools_summary.codex.version }}{% else %}✗ Codex CLI: not installed{% endif %}"
      - "==========================="

- name: Warn if no tools were installed
  debug:
    msg:
      - "WARNING: No AI tools were successfully installed!"
      - "Please check the installation logs above for errors."
      - "You may need to:"
      - "  • Check your internet connection"
      - "  • Verify volta is properly configured"
      - "  • Run the installation again"
  when: not (ai_tools_summary.claude_code.installed or ai_tools_summary.codex.installed)

- name: Ensure at least one tool is installed
  assert:
    that:
      - ai_tools_summary.claude_code.installed or ai_tools_summary.codex.installed
    fail_msg: "No AI tools were installed or detected."

- name: Provide usage instructions
  debug:
    msg:
      - "AI Tools Installation Complete!"
      - ""
      - "Installed tools:"
      - "{% if ai_tools_summary.claude_code.installed %}  • Claude Code ({{ ai_tools_summary.claude_code.version }}){% endif %}"
      - "{% if ai_tools_summary.codex.installed %}  • Codex CLI ({{ ai_tools_summary.codex.version }}){% endif %}"
      - ""
      - "Next steps:"
      - "{% if ai_tools_summary.claude_code.installed %}  • Run 'claude' to start Claude Code CLI{% endif %}"
      - "{% if ai_tools_summary.codex.installed %}  • Run 'codex' to start Codex CLI{% endif %}"
      - "  • Authentication and configuration may be required"
      - ""
      - "Both tools are now available in your PATH via volta."
  when: ai_tools_summary.claude_code.installed or ai_tools_summary.codex.installed
