---
- name: Download volta installer if not exists
  get_url:
    url: https://get.volta.sh
    dest: "{{ installers_cache_dir }}/volta-installer"
    mode: "0755"
    force: false
    timeout: 30
  register: volta_installer_download
  retries: 3
  delay: 5
  until: volta_installer_download is succeeded

- name: Install volta by volta installer
  script: "{{ installers_cache_dir }}/volta-installer"
  args:
    executable: /bin/bash
    creates: "{{ volta_root }}"

- name: Create envmgr profile.d directory
  file:
    path: "{{ envmgr_profile_dir }}"
    state: directory
    mode: "0755"

- name: Remove legacy numbered Volta profile drop-in
  file:
    path: "{{ envmgr_profile_dir }}/30-node-volta.sh"
    state: absent

- name: Write Volta profile drop-in
  copy:
    dest: "{{ envmgr_profile_dir }}/node-volta.sh"
    mode: "0644"
    content: |
      export VOLTA_HOME="${VOLTA_HOME:-$HOME/.volta}"
      case ":$PATH:" in
        *":$VOLTA_HOME/bin:"*) ;;
        *) export PATH="$VOLTA_HOME/bin:$PATH" ;;
      esac
      export VOLTA_FEATURE_PNPM=1

- name: Check whether Node.js is already available through Volta
  command: node --version
  register: node_version_check
  changed_when: false
  failed_when: false

- name: Install node (Latest Version)
  command: volta install node@lts
  register: node_install_result
  changed_when: node_install_result.rc == 0
  when: node_version_check.rc != 0

- name: Check whether pnpm is already available through Volta
  command: pnpm --version
  register: pnpm_version_check
  changed_when: false
  failed_when: false

- name: Install pnpm
  command: volta install pnpm@latest
  register: pnpm_install_result
  changed_when: pnpm_install_result.rc == 0
  when: pnpm_version_check.rc != 0
