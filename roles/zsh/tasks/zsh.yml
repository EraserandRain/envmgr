---
- name: Check if Plugin zsh-autosuggestions exists
  stat:
    path: "{{ omz.custom_plugins }}/zsh-autosuggestions"
  register: plugin_zsh_autosuggestions

- name: Download Plugin zsh-autosuggestions if not exists
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ omz.custom_plugins }}/zsh-autosuggestions"
    version: master
    update: false
  when: not plugin_zsh_autosuggestions.stat.exists

- name: Include alias varsfile
  include_vars: alias.yml

- name: Create envmgr zsh configuration directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ envmgr_profile_dir }}"
    - "{{ envmgr_user_profile_dir }}"
    - "{{ envmgr_zsh_config_dir }}"
    - "{{ envmgr_user_zsh_dir }}"

- name: Write envmgr zsh aliases
  template:
    src: aliases.zsh.j2
    dest: "{{ envmgr_zsh_config_dir }}/aliases.zsh"
    mode: "0644"

- name: Write envmgr zsh prompt
  template:
    src: prompt.zsh.j2
    dest: "{{ envmgr_zsh_config_dir }}/prompt.zsh"
    mode: "0644"

- name: Remove legacy inline aliases from zshrc
  lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: "alias {{ item.key }}='{{ item.value }}' "
    state: absent
  loop: "{{ zsh_alias | dict2items }}"

- name: Remove legacy zsh custom block
  replace:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    regexp: |-
      (?ms)^### ANSIBLE MANAGED CUSTOM BLOCK ###\n.*?\n### ANSIBLE MANAGED CUSTOM BLOCK ###\n?
    replace: ""

- name: Install envmgr profile.d loader for zsh
  blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    create: true
    mode: "0644"
    marker: "# {mark} ENVMGR PROFILE.D LOADER"
    block: "{{ envmgr_profile_loader_block }}"

- name: Install envmgr zsh.d loader
  blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    create: true
    mode: "0644"
    marker: "# {mark} ENVMGR ZSH.D LOADER"
    block: "{{ envmgr_zsh_loader_block }}"

- name: Create ~/.zprofile if not exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.zprofile"
    state: touch
    mode: "0644"
