---
- name: Discover latest Kubernetes stable version
  uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: k8s_stable_release
  until: k8s_stable_release is succeeded
  retries: 3
  delay: 5

- name: Set kubernetes major version
  set_fact:
    kubernetes_major_version: "{{ k8s_stable_release.content | trim | regex_replace('^v([0-9]+\\.[0-9]+).*', '\\1') }}"

- name: Show discovered Kubernetes version
  debug:
    msg: "Discovered latest Kubernetes: {{ k8s_stable_release.content | trim }} → APT repo v{{ kubernetes_major_version }}"

- name: Install dependencies for role {{ role_name }}
  become: true
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl

- name: Create /etc/apt/keyrings if not exists
  become: true
  file:
    path: "/etc/apt/keyrings"
    state: directory
    mode: "0755"

- name: Download kubeadm apt key
  become: true
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_major_version }}/deb/Release.key"
    dest: /tmp/kubernetes-apt-keyring.gpg
    mode: "0644"
  register: k8s_key_download
  until: k8s_key_download is succeeded
  retries: 5
  delay: 5

- name: Add kubeadm apt key
  become: true
  apt_key:
    file: /tmp/kubernetes-apt-keyring.gpg
    keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    state: present

- name: Add kubeadm apt repository
  become: true
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_major_version }}/deb/ /"
    state: present
    filename: kubeadm
    update_cache: false

- name: Update apt cache (kubeadm source only)  # noqa: command-instead-of-module
  become: true
  command: >
    apt-get update
    -o Dir::Etc::sourcelist="sources.list.d/kubeadm.list"
    -o Dir::Etc::sourceparts="-"
    -o APT::Get::List-Cleanup="0"
  changed_when: false

- name: Unhold kubelet kubeadm kubectl
  become: true
  dpkg_selections:
    name: "{{ item }}"
    selection: install
  loop:
    - kubelet
    - kubeadm
    - kubectl
    - cri-tools
    - kubernetes-cni

- name: Install kubernetes packages
  become: true
  apt:
    pkg:
      - kubelet
      - kubeadm
      - kubectl
      - cri-tools
      - kubernetes-cni
    state: latest

- name: Collect installed versions
  shell: "dpkg-query -W -f='${binary:Package}: ${Version}\n' kubeadm kubelet kubectl cri-tools kubernetes-cni"
  register: _k8s_versions
  changed_when: false

- name: Show installed versions
  debug:
    msg: |-
      Installed:
      {{ _k8s_versions.stdout }}

- name: Enable CRI plugin
  become: true
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins\s*=\s*\[.*\]$'
    line: 'enabled_plugins = ["cri"]'

- name: Add CRI configuration
  become: true
  blockinfile:
    path: /etc/containerd/config.toml
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      [plugins."io.containerd.grpc.v1.cri".containerd]
        endpoint = "unix:///var/run/containerd/containerd.sock"
    insertafter: "^enabled_plugins =.*$"

- name: Restart containerd service
  become: true
  systemd:
    name: containerd
    state: restarted
