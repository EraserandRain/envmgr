---
- name: Install git repository prerequisites on Ubuntu
  become: true
  apt:
    pkg:
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    cache_valid_time: 86400
  when: ansible_facts["distribution"] == "Ubuntu"

- name: Add git PPA on Ubuntu
  become: true
  apt_repository:
    repo: ppa:git-core/ppa
  when: ansible_facts["distribution"] == "Ubuntu"

- name: Upgrade git
  become: true
  apt:
    pkg: git
    state: latest

- name: Set vim as default git editor
  community.general.git_config:
    name: core.editor
    value: vim
    scope: global

- name: Set main as default git branch
  community.general.git_config:
    name: init.defaultBranch
    value: main
    scope: global
