---
- name: Validate git install source
  assert:
    that:
      - git_install_source in ["distro", "git_core_ppa"]
    fail_msg: >-
      git_install_source must be either 'distro' or 'git_core_ppa'.

- name: Explain when git-core PPA is ignored
  debug:
    msg: >-
      git_install_source=git_core_ppa only applies to Ubuntu 22.04 and earlier;
      falling back to distro git on
      {{ ansible_facts["distribution"] }} {{ ansible_facts["distribution_version"] }}.
  when:
    - git_install_source == "git_core_ppa"
    - ansible_facts["distribution"] != "Ubuntu" or ansible_facts["distribution_major_version"] | int >= 24

- name: Install git-core PPA prerequisites on Ubuntu 22.04 and earlier
  become: true
  apt:
    pkg:
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    cache_valid_time: 86400
  when:
    - git_install_source == "git_core_ppa"
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_major_version"] | int < 24

- name: Add git-core PPA on Ubuntu 22.04 and earlier
  become: true
  apt_repository:
    repo: ppa:git-core/ppa
  when:
    - git_install_source == "git_core_ppa"
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_major_version"] | int < 24

- name: Install or upgrade git
  become: true
  apt:
    name: git
    state: latest
    update_cache: true
    cache_valid_time: 86400

- name: Set vim as default git editor
  community.general.git_config:
    name: core.editor
    value: vim
    scope: global

- name: Set main as default git branch
  community.general.git_config:
    name: init.defaultBranch
    value: main
    scope: global
