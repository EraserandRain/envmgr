---
- name: Download miniconda installer if not exists
  connection: local
  get_url:
    url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
    dest: "/tmp/miniconda-installer.sh"
    mode: "0755"
    force: false

- name: Install miniconda by miniconda installer
  script: /tmp/miniconda-installer.sh -b -u -p ~/miniconda3
  args:
    creates: "{{ conda_bin }}/conda"

- name: Create envmgr profile.d directory
  file:
    path: "{{ envmgr_profile_dir }}"
    state: directory
    mode: "0755"

- name: Remove legacy numbered conda profile drop-in
  file:
    path: "{{ envmgr_profile_dir }}/40-python-conda.sh"
    state: absent

- name: Write conda profile drop-in
  copy:
    dest: "{{ envmgr_profile_dir }}/python-conda.sh"
    mode: "0644"
    content: |
      case ":$PATH:" in
        *":{{ conda_bin }}:"*) ;;
        *) export PATH="{{ conda_bin }}:$PATH" ;;
      esac
