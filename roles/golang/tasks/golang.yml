- name: Install dependencies
  become: true
  apt:
    pkg:
      - bison

- name: Ensure installers cache directory exists
  file:
    path: "{{ installers_cache_dir }}"
    state: directory
    mode: "0755"

- name: Download gvm-installer if not exists
  get_url:
    url: https://github.com/moovweb/gvm/raw/master/binscripts/gvm-installer
    dest: "{{ installers_cache_dir }}/gvm-installer"
    mode: "0755"
    force: false
    timeout: 30
  register: gvm_installer_download
  retries: 3
  delay: 5
  until: gvm_installer_download is succeeded

- name: Install gvm by gvm-installer
  script: "{{ installers_cache_dir }}/gvm-installer"
  args:
    executable: /bin/bash
    creates: "{{ gvm_root }}"

- name: Setting gvm in profile files
  blockinfile:
    path: "{{ item }}"
    block: |
      [[ -s "$HOME/.gvm/scripts/gvm" ]] && source "$HOME/.gvm/scripts/gvm"
  loop:
    - "{{ ansible_facts['env']['HOME'] }}/.bashrc"
    - "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    - "{{ ansible_facts['env']['HOME'] }}/.profile"

- name: Install golang (Default Version is {{ golang_default_version }})
  shell: |
    source "{{ gvm_path }}"
    gvm install go1.4 -B
    gvm install go{{ golang_default_version }} -B
    gvm use go{{ golang_default_version }} --default
    go env -w GO111MODULE=on
    go env -w GOPROXY=https://goproxy.cn
  args:
    executable: /bin/bash
    creates: "{{ golang_path }}"
