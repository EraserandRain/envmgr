- name: Install Java (Default Version is {{ java_default_version }})
  become: true
  apt:
    update_cache: true
    pkg:
      - openjdk-8-jdk

- name: Create envmgr profile.d directory
  file:
    path: "{{ envmgr_profile_dir }}"
    state: directory
    mode: "0755"

- name: Remove legacy numbered Java profile drop-in
  file:
    path: "{{ envmgr_profile_dir }}/20-java.sh"
    state: absent

- name: Write Java profile drop-in
  copy:
    dest: "{{ envmgr_profile_dir }}/java.sh"
    mode: "0644"
    content: |
      export JAVA_HOME="{{ java_home }}"
