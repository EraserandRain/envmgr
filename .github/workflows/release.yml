name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    env:
      ENVMGR_HOME: /tmp/.envmgr
      UV_NO_PROGRESS: "1"

    steps:
      - name: Validate immutable version tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must look like v0.2.0: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Bootstrap envmgr runtime
        run: uv run envmgr setup

      - name: Run validation suite
        run: uv run validate

      - name: Run smoke tests
        run: uv run smoke-test

      - name: Build no-sources release artifacts
        run: uv build --no-sources --out-dir dist

      - name: Inspect artifacts and package surface
        run: |
          python - <<'PY'
          from configparser import ConfigParser
          from pathlib import Path
          from zipfile import ZipFile

          dist = Path("dist")
          wheels = sorted(dist.glob("envmgr-*.whl"))
          sdists = sorted(dist.glob("envmgr-*.tar.gz"))
          unexpected = sorted(dist.glob("*envmgr-dev-helpers*"))

          if unexpected:
              raise SystemExit(f"unexpected envmgr-dev-helpers artifact: {unexpected}")
          if len(wheels) != 1:
              raise SystemExit(f"expected one envmgr wheel, found: {wheels}")
          if len(sdists) != 1:
              raise SystemExit(f"expected one envmgr sdist, found: {sdists}")

          with ZipFile(wheels[0]) as wheel:
              names = wheel.namelist()
              entry_point_files = [
                  name for name in names if name.endswith(".dist-info/entry_points.txt")
              ]
              if len(entry_point_files) != 1:
                  raise SystemExit(
                      f"expected one entry_points.txt, found: {entry_point_files}"
                  )

              parser = ConfigParser()
              parser.read_string(wheel.read(entry_point_files[0]).decode())
              console_scripts = dict(parser.items("console_scripts"))
              expected_scripts = {"envmgr": "envmgr.main:main"}
              if console_scripts != expected_scripts:
                  raise SystemExit(
                      "expected installed artifacts to expose only envmgr; "
                      f"found: {console_scripts}"
                  )

              required_assets = (
                  "envmgr/_assets/ansible.cfg",
                  "envmgr/_assets/requirements.yaml",
                  "envmgr/_assets/playbooks/",
                  "envmgr/_assets/roles/",
                  "envmgr/_assets/vars/",
              )
              for asset in required_assets:
                  if not any(name == asset or name.startswith(asset) for name in names):
                      raise SystemExit(f"missing bundled runtime asset: {asset}")
          PY

      - name: Prepare installer asset
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          test -f "dist/envmgr-${package_version}-py3-none-any.whl"
          test -f "dist/envmgr-${package_version}.tar.gz"

          python - "$package_version" <<'PY'
          from pathlib import Path
          import re
          import sys

          version = sys.argv[1]
          source = Path("install.sh").read_text()
          installer, replacements = re.subn(
              r'^DEFAULT_VERSION="[^"]+"$',
              f'DEFAULT_VERSION="{version}"',
              source,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              raise SystemExit("expected DEFAULT_VERSION in install.sh")
          Path("dist/install.sh").write_text(installer)
          PY
          chmod +x dist/install.sh
          bash dist/install.sh --help

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum envmgr-*.whl envmgr-*.tar.gz install.sh > SHA256SUMS
          cat SHA256SUMS

      - name: Smoke-test isolated wheel install
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          wheel="dist/envmgr-${package_version}-py3-none-any.whl"
          python_path="$(python -c 'import sys; print(sys.executable)')"
          tmpdir="$(mktemp -d)"
          export UV_TOOL_DIR="$tmpdir/tools"
          export UV_TOOL_BIN_DIR="$tmpdir/bin"
          uv tool install --python "$python_path" --force "$wheel"
          "$UV_TOOL_BIN_DIR/envmgr" --version

          for helper in create lint ansible-check typecheck validate smoke-test; do
            if [[ -e "$UV_TOOL_BIN_DIR/$helper" || -e "$UV_TOOL_BIN_DIR/$helper.exe" ]]; then
              echo "unexpected checkout-only helper shim installed: $helper" >&2
              exit 1
            fi
          done

      - name: Write fixed release note preface
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          cat > release-notes.md <<EOF
          ## Install

          Download the installer and checksum file, inspect the script, verify the
          installer checksum, then install:

          \`\`\`bash
          curl -fsSLO https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/install.sh
          curl -fsSLO https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/SHA256SUMS
          grep ' install.sh$' SHA256SUMS | sha256sum -c -
          less install.sh
          bash install.sh
          \`\`\`

          ## Upgrade

          \`\`\`bash
          envmgr self update --version ${package_version}
          \`\`\`

          ## Uninstall

          \`\`\`bash
          envmgr self uninstall --yes
          \`\`\`

          ## Clean Reinstall

          \`\`\`bash
          uv tool uninstall envmgr || true
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/install.sh | bash
          hash -r
          \`\`\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/envmgr-*.whl \
            dist/envmgr-*.tar.gz \
            dist/install.sh \
            dist/SHA256SUMS \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$(cat release-notes.md)"
