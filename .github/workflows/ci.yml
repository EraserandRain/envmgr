name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ENVMGR_HOME: ${{ runner.temp }}/.envmgr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap envmgr runtime
        run: uv run setup

      - name: Verify first-run command surface
        run: |
          uv run ping
          uv run install -l

      - name: Run validation suite
        run: uv run validate

      - name: Run smoke tests
        run: uv run smoke-test
